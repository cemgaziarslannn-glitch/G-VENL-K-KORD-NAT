<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CGA Güvenlik Sistemi - Elite Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #121418;
    --card-bg: rgba(30, 34, 40, 0.6);
    --border-color: rgba(255, 255, 255, 0.08);
    --primary: #3498db;
    --success: #2ecc71;
    --danger: #e74c3c;
    --warning: #f1c40f;
    --text-main: #ecf0f1;
    --text-muted: #95a5a6;
    --blur: blur(12px);
  }

  body { 
    margin: 0; 
    font-family: 'Poppins', sans-serif; 
    background: radial-gradient(circle at top, #2c3e50 0%, #1a252f 40%, #121418 100%); 
    color: var(--text-main); 
    overflow-x: hidden;
    min-height: 100vh;
  }
  
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNmZmYiIGZpbGwtb3BhY2l0eT0iMC4wMyI+PHBhdGggZD0iTDAgMGg0MHY0MEgwVjB6bTIwIDIwaDIwdjIwSDIWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwSDIwVjB6Ii8+PC9nPjwvZz48L3N2Zz4=');
    pointer-events: none;
    z-index: -1;
  }

  .container { 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    padding: 20px; 
    transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1); 
  }

  header { 
    text-align: center; 
    margin-bottom: 20px; 
    width: 100%;
  }

  .main-title {
    font-size: 24px;
    font-weight: 700;
    margin: 0;
    letter-spacing: 1px;
    background: linear-gradient(to right, #fff, #b2bec3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .sub-title {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-muted);
    margin-top: 5px;
  }

  button { 
    padding: 14px 20px; 
    margin: 8px 4px; 
    border-radius: 12px; 
    border: none; 
    cursor: pointer; 
    font-weight: 600; 
    transition: all 0.3s ease;
    font-family: 'Poppins', sans-serif;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
  }

  button:active { transform: scale(0.97); }

  #nobetAlBtn { background: linear-gradient(135deg, #3498db, #2980b9); color: white; box-shadow: 0 4px 15px rgba(41,128,185,0.3); }
  #nobetBitirBtn { background: linear-gradient(135deg, #c0392b, #96281b); color: white; box-shadow: 0 4px 15px rgba(192,57,43,0.3); }
  #nobetBitirBtn:disabled { background: #3d3d3d; color: #7f8c8d; box-shadow: none; }
  
  /* MAVİ DEVRİYE BAŞLAT BUTONU */
  #devriyeStartBtn { 
    background: linear-gradient(135deg, #3498db, #2980b9); 
    color: white; 
    box-shadow: 0 4px 15px rgba(41,128,185,0.3); 
    animation: pulseButton 2s infinite;
  }
  
  @keyframes pulseButton {
    0% { box-shadow: 0 0 0 0 rgba(52, 152, 219, 0.4); }
    70% { box-shadow: 0 0 0 10px rgba(52, 152, 219, 0); }
    100% { box-shadow: 0 0 0 0 rgba(52, 152, 219, 0); }
  }

  #devriyeEndBtn { background: linear-gradient(135deg, #c0392b, #96281b); color: white; box-shadow: 0 4px 15px rgba(192,57,43,0.3); }
  #devriyeEndBtn:disabled { background: #3d3d3d; color: #7f8c8d; box-shadow: none; }

  .status { 
    margin: 15px 0; 
    padding: 15px; 
    background: var(--card-bg); 
    backdrop-filter: var(--blur);
    border: 1px solid var(--border-color);
    border-radius: 12px; 
    width: 100%; 
    text-align: center; 
    font-size: 14px; 
    color: var(--text-muted);
    transition: all 0.3s ease;
  }
  
  /* Sadece süre varken görünmesi için varsayılan gizleme */
  #devriyeStatus { display: none; }
  #devriyeStatus.active { display: block; color: var(--success); font-weight: 600; }

  .panel { 
    background: var(--card-bg); 
    backdrop-filter: var(--blur);
    border: 1px solid var(--border-color);
    padding: 25px; 
    border-radius: 20px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
    width: 100%; 
    margin-top: 20px;
    box-sizing: border-box;
  }

  .panel h2 { 
    margin-top: 0; 
    text-align: center; 
    font-size: 18px;
    font-weight: 600;
    color: #fff;
  }

  .qr-list div { 
    margin-bottom: 10px; 
    display: flex; 
    align-items: center; 
    justify-content: space-between; 
    background: rgba(0,0,0,0.2);
    padding: 10px;
    border-radius: 10px;
  }
  
  .qr-list span { font-size: 14px; color: var(--text-main); }

  .qr-list button.qrBtn { 
    background: #34495e; color:#fff; width:auto; 
    padding: 8px 15px !important;
    font-size: 11px !important;
  }
  .qr-list button.qrBtn.read { background: linear-gradient(135deg, #2ecc71, #27ae60); }

  input[type=date], input[type=text], input[type=password] { 
    padding: 12px; 
    border-radius: 10px; 
    border: 1px solid var(--border-color); 
    background: rgba(0,0,0,0.2);
    color: white;
    font-size: 14px;
    width: 100%;
    box-sizing: border-box;
  }

  /* Top Buttons */
  #historyToggleBtn, #logoutTopBtn, #cizelgeBtn, #kayitBtn, .profileIcon {
    position: fixed; top: 20px; 
    width: 50px; height: 50px; 
    border-radius: 50%; 
    border: 1px solid var(--border-color);
    backdrop-filter: var(--blur);
    cursor: pointer; z-index: 1001;
    display: flex; align-items: center; justify-content: center; 
    font-size: 20px; 
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  
  .profileIcon { background: rgba(22, 160, 133, 0.8); left: 20px; }
  #historyToggleBtn { background: rgba(243, 156, 18, 0.8); }
  #logoutTopBtn { background: rgba(192, 57, 43, 0.8); }
  #cizelgeBtn { background: rgba(142, 68, 173, 0.8); }
  #kayitBtn { background: rgba(52, 152, 219, 0.8); }

  #historyPanel {
    position: fixed; top: 0; right: -100%;
    width: 300px; height: 100%;
    background: rgba(18, 20, 24, 0.95);
    backdrop-filter: blur(20px);
    border-left: 1px solid var(--border-color);
    color: #fff;
    padding: 80px 20px 20px;
    transition: right 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    overflow-y: auto; z-index: 1000;
    box-sizing: border-box;
  }
  #historyPanel h2 { text-align: center; font-weight:700; }

  @media (min-width:600px){
    .container { max-width: 500px; margin: auto; }
  }

  /* Mobil Buton Konumları */
  @media (max-width: 600px) {
    #logoutTopBtn { right: 10px; }
    #historyToggleBtn { right: 65px; }
    #cizelgeBtn { right: 120px; }
    #kayitBtn { right: 175px; }
    header { margin-top: 60px; }
  }
</style>
</head>
<body>

<button class="profileIcon" id="profileBtn" title="Profil">&#128100;</button>

<button id="historyToggleBtn" title="Devriye Geçmişi">💾</button>
<button id="kayitBtn" title="Kayıt" style="display:none;">📋</button>
<button id="logoutTopBtn" title="Çıkış">🚪</button>
<button id="cizelgeBtn" title="Çizelge" onclick="window.location.href='cizelge.html'">📅</button>

<div id="historyPanel">
  <h2>Geçmiş</h2>
  <label for="filterDate" style="font-size:12px; color:var(--text-muted);">Tarih Seçin:</label>
  <input type="date" id="filterDate">
  <div id="devriyeHistory" style="margin-top:20px;"></div>
</div>

<div id="profileModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background: rgba(30,30,30,0.95); padding:25px; border-radius:20px; border:1px solid var(--border-color); z-index:9999; width:85%; max-width:400px; box-sizing:border-box;">
  <span id="profileClose" style="position:absolute; top:15px; right:15px; cursor:pointer; font-size:20px; color:#fff; opacity:0.6;">✖</span>
  <h3 style="text-align:center; color:#fff; margin-top:0;">Profil Ayarları</h3>
  
  <label style="font-size:12px; color:var(--text-muted);">Kullanıcı Adı</label>
  <input type="text" id="profileUsername" disabled style="background:#2c3e50; margin-bottom:15px;">
  
 <label style="font-size:12px; color:var(--text-muted);">Eski Şifre</label>
<div style="position:relative; width:100%; display:flex; align-items:center; margin-bottom:15px;">
  <input type="password" id="oldPassword" style="padding-right:40px;">
  <span class="togglePassword" data-target="oldPassword" style="position:absolute; right:12px; cursor:pointer;">👀</span>
</div>

<label style="font-size:12px; color:var(--text-muted);">Yeni Şifre</label>
<div style="position:relative; width:100%; display:flex; align-items:center; margin-bottom:15px;">
  <input type="password" id="newPassword" style="padding-right:40px;">
  <span class="togglePassword" data-target="newPassword" style="position:absolute; right:12px; cursor:pointer;">👀</span>
</div>
  
  <label style="font-size:12px; color:var(--text-muted);">Telefon</label>
  <input type="text" id="phoneNumber" placeholder="+90..." style="margin-bottom:15px;">
  
  <button id="updateProfileBtn" style="width:100%; background:linear-gradient(135deg, #2ecc71, #27ae60); color:#fff; margin-top:10px;">Güncelle</button>

  <div id="profileMessage" style="margin-top:15px; font-size:13px; text-align:center;"></div>
</div>

<div class="container" id="mainContainer">
<header>
  <h1 class="main-title">CGA Güvenlik Sistemi</h1>
  <div id="siteName" class="site-name"></div>
  <h2 class="sub-title">Güvenlik Paneli</h2>
</header>

  <div class="panel" style="padding:15px;">
    <div style="display:flex; justify-content:space-between; gap:10px;">
      <button id="nobetAlBtn" style="flex:1;">Nöbet Al</button>
      <button id="nobetBitirBtn" disabled style="flex:1;">Nöbet Bitir</button>
    </div>
    <div class="status" id="nobetStatus">Henüz nöbette değilsiniz.</div>
    <div id="nobetTimer" style="text-align:center; font-weight:600; color:var(--success); font-size:16px;"></div>
  </div>


  <div class="panel">
    <h2>Devriye İşlemleri</h2>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
      <button id="devriyeStartBtn">Devriyeyi Başlat</button>
      <button id="olayBtn" style="background:linear-gradient(135deg, #f39c12, #e67e22); color:white; box-shadow: 0 4px 15px rgba(243,156,18,0.3);">Olay Bildir</button>
    </div>
    <button id="devriyeEndBtn" disabled style="width:100%; margin-top:10px;">Devriyeyi Bitir</button>

    <div class="status" id="devriyeStatus"></div>

    <div id="devriyePointsArea">
        <div class="qr-list" id="qrListContainer"></div>
    </div>
  </div>
</div>

<div id="qrScannerModal" style="display:none; position:fixed; inset:0; z-index:9999; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
  <div id="qr-reader" style="width:100%; max-width:400px;"></div>
  <div style="display:flex; gap:10px; margin-top:20px;">
    <button id="closeScanner" style="background:#e74c3c; color:white; padding:12px 25px;">Kapat</button>
    <button id="flashToggle" style="background:#f1c40f; color:#000; padding:12px 25px;">🔦 Flaş</button>
  </div>
</div>

<div id="warningModal" style="
    display:none;
    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background: rgba(231, 76, 60, 0.95);
    color: #fff;
    padding: 15px 25px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    z-index: 99999;
    text-align: center;
    backdrop-filter: blur(5px);
">
  Uyarı Mesajı
</div>


<script src="https://unpkg.com/html5-qrcode"></script>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import { getDatabase, ref, onValue, push, set, update, get } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

/* === QR ile seçilen site Firebase === */
const siteID = localStorage.getItem("siteID");
const siteConfigStr = localStorage.getItem("siteConfig");

if (!siteID || !siteConfigStr) {
  alert("Site bağlantısı yok. Lütfen QR kodu tekrar okutunuz.");
  window.location.href = "index.html";
}
const siteConfig = JSON.parse(siteConfigStr);
let app = getApps().find(a => a.name === `siteApp-${siteID}`);
if (!app) {
  app = initializeApp(siteConfig, `siteApp-${siteID}`);
}
const db = getDatabase(app);
const siteNameEl = document.getElementById("siteName");
// MERKEZ BAĞLANTISI
const merkezConfig = {
  databaseURL: "https://kolartguvenlik-e002d-default-rtdb.firebaseio.com"
};
const merkezApp = getApps().find(a => a.name === "merkezApp") || initializeApp(merkezConfig, "merkezApp");
const merkezDb = getDatabase(merkezApp);
async function loadSiteName(){
  try{
    const snap = await get(ref(db, "settings/siteName"));
    if(!snap.exists()) return;
    const name = String(snap.val()).trim();
    if(!name) return;
    siteNameEl.textContent = name;
    siteNameEl.classList.remove('hide');
    siteNameEl.style.display = 'block';

    // ⏳ 10 saniye sonra kaybolsun
    setTimeout(() => {
      siteNameEl.classList.add('hide');

      // animasyon bitince DOM’dan tamamen çıkar
      setTimeout(() => {
        siteNameEl.style.display = 'none';
        siteNameEl.classList.remove('hide');
      }, 500);

    }, 10000);

  } catch (e) {
    console.log("Site adı okunamadı");
  }
}
loadSiteName();
const currentUser = JSON.parse(sessionStorage.getItem('currentUser'));
if(!currentUser || currentUser.type!=='security'){
  alert("Güvenlik kullanıcı ile giriş yapmalısınız!");
  window.location.href="index.html";
}
const nobetRecordsRef = ref(db,'nobetRecords');

// === Olay Bildir / Kargo Bildir için nöbet kontrolü ===
async function checkActiveNobet(){
    const snapshot = await get(nobetRecordsRef);
    const val = snapshot.val();
    if(val){
        for(const rec of Object.values(val)){
            if(rec.startBy === (currentUser.name || currentUser.username) && rec.status === 'started'){
                return true; // Nöbet var
            }
        }
    }
    return false; // Nöbet yok
}
olayBtn.addEventListener('click', async (e) => {
    e.preventDefault();
    const hasNobet = await checkActiveNobet();
    if(!hasNobet){
        showWarningModal("Olay Bildirmek için önce nöbeti almalısınız!");
        return;
    }
    window.location.href = 'olay.html';
});
const profileBtn = document.getElementById("profileBtn");
const profileModal = document.getElementById("profileModal");
const profileClose = document.getElementById("profileClose");
const profileUsername = document.getElementById("profileUsername");
const oldPassword = document.getElementById("oldPassword");
const newPassword = document.getElementById("newPassword");
const phoneNumber = document.getElementById("phoneNumber");
const updateProfileBtn = document.getElementById("updateProfileBtn");
const profileMessage = document.getElementById("profileMessage");
const logoutTopBtn = document.getElementById("logoutTopBtn");
oldPassword.addEventListener('input', ()=>{
    oldPassword.value = oldPassword.value.toUpperCase();
});
newPassword.addEventListener('input', ()=>{
    newPassword.value = newPassword.value.toUpperCase();
});

profileUsername.value = currentUser.name || currentUser.username || "";

profileBtn.addEventListener('click', ()=>{ profileModal.style.display='block'; });
profileClose.addEventListener('click', ()=>{ profileModal.style.display='none'; });

updateProfileBtn.addEventListener('click', async ()=> {
  profileMessage.innerText='';
  if(!oldPassword.value && !newPassword.value && !phoneNumber.value) return;

  const key = currentUser.username;
  const userRef = ref(db, 'users/'+key);

  const snapshot = await get(userRef);
  const user = snapshot.val();
  if(!user){ profileMessage.innerText="Kullanıcı bulunamadı."; return; }

  if(oldPassword.value && oldPassword.value !== user.password){
    profileMessage.innerText="Eski şifre hatalı!"; return;
  }

  const updates = {};
  if(newPassword.value) updates.password = newPassword.value;
  if(phoneNumber.value) updates.phone = phoneNumber.value;

  await update(userRef, updates);
  profileMessage.innerText="Profil başarıyla güncellendi!";
  oldPassword.value=''; newPassword.value=''; phoneNumber.value='';
  if(updates.password) currentUser.password = updates.password;
  if(updates.phone) currentUser.phone = updates.phone;
  sessionStorage.setItem('currentUser', JSON.stringify(currentUser));
});
// Şifre göster/gizle göz simgesi
document.querySelectorAll('.togglePassword').forEach(el=>{
  el.addEventListener('click', ()=>{
    const input = document.getElementById(el.dataset.target);
    if(input.type === "password"){
      input.type = "text";
      el.innerText = "🙈"; // göz kapalı simgesi
    } else {
      input.type = "password";
      el.innerText = "👀"; // göz açık simgesi
    }
  });
});
phoneNumber.addEventListener('input', () => {
    phoneNumber.value = phoneNumber.value.replace(/\D/g, ''); // sadece rakam bırak
});
logoutTopBtn.addEventListener('click', ()=>{
  sessionStorage.removeItem('currentUser');
  window.location.href = "index.html";
});
/* === Panel elemanları === */
const nobetAlBtn = document.getElementById("nobetAlBtn");
const nobetBitirBtn = document.getElementById("nobetBitirBtn");
const nobetStatus = document.getElementById("nobetStatus");
const devriyeStartBtn = document.getElementById("devriyeStartBtn");
const devriyeEndBtn = document.getElementById("devriyeEndBtn");
const devriyeStatus = document.getElementById("devriyeStatus");
const devriyePointsArea = document.getElementById("devriyePointsArea");
const devriyeHistoryEl = document.getElementById("devriyeHistory");
const filterDate = document.getElementById("filterDate");
const historyToggleBtn = document.getElementById("historyToggleBtn");
const historyPanel = document.getElementById("historyPanel");
const mainContainer = document.getElementById("mainContainer");
const qrListContainer = document.getElementById('qrListContainer');

// QR Kütüphanesi kontrolü
function hasCameraLib(){ return typeof Html5Qrcode !== 'undefined'; }

nobetAlBtn.addEventListener('click', (e)=>{ 
  e.stopImmediatePropagation(); // diğer click listenerları engeller
  window.location.href = "nobet.html";
});
nobetBitirBtn.addEventListener('click', (e)=>{ 
  e.stopImmediatePropagation();
  window.location.href = "nobet.html";
});

// Nöbet Durumu ve Sayacı
onValue(nobetRecordsRef, snapshot=>{
  const val = snapshot.val();
  let activeRecord = null;
  if(val){
    Object.values(val).forEach(rec=>{
      if(rec.startBy === (currentUser.name || currentUser.username) && rec.status==='started'){
        activeRecord = rec;
      }
    });
  }
  let nobetTimerInterval = null;
  if(activeRecord){
    nobetStatus.innerText = `👮 ${activeRecord.startBy} | 🧭 ${activeRecord.startPoint} - Nöbettesin`;
    nobetAlBtn.disabled = true;
    nobetBitirBtn.disabled = false;
    // Sayaç
    const startTime = new Date(activeRecord.startTime);
    clearInterval(nobetTimerInterval);
    nobetTimerInterval = setInterval(()=>{
      const now = new Date();
      const diff = Math.floor((now - startTime)/1000); // saniye
      const h = String(Math.floor(diff/3600)).padStart(2,'0');
      const m = String(Math.floor((diff%3600)/60)).padStart(2,'0');
      const s = String(diff%60).padStart(2,'0');
      document.getElementById("nobetTimer").innerText = `⏱️ Nöbet Süresi: ${h}:${m}:${s}`;
    },1000);
  } else {
    nobetStatus.innerText = 'Henüz nöbette değilsiniz.';
    document.getElementById("nobetTimer").innerText = '';
    nobetAlBtn.disabled = false;
    nobetBitirBtn.disabled = true;
    clearInterval(nobetTimerInterval);
  }
});

// Nöbet Al/Bitir
nobetAlBtn.addEventListener('click', ()=>{ 
  const newRecord = {
    fromSecurity: currentUser.username || currentUser.name,
    startBy: currentUser.name || currentUser.username,
    startPoint: 'D BLOK', // opsiyonel, isteğe göre
    startTime: new Date().toISOString(),
    status: 'started'
  };
  push(nobetRecordsRef, newRecord);
});
nobetBitirBtn.addEventListener('click', ()=>{
  // aktif nöbeti bul ve status'u değiştir
  get(nobetRecordsRef).then(snapshot=>{
    const val = snapshot.val();
    if(val){
      Object.entries(val).forEach(([key, rec])=>{
        if(rec.startBy === (currentUser.name || currentUser.username) && rec.status==='started'){
          update(ref(db,'nobetRecords/'+key), {status:'ended', endTime:new Date().toISOString()});
        }
      });
    }
  });
});

function showWarningModal(message, duration=3000){
    const modal = document.getElementById('warningModal');
    modal.innerText = message;
    modal.style.display = 'block';
    setTimeout(()=>{ modal.style.display = 'none'; }, duration);
}

// === Devriye Kontrolü (Geliştirildi) ===
const currentDevriyeRef = ref(db, 'currentDevriye');
let devriyeTimerInterval = null;

onValue(currentDevriyeRef, (snapshot) => {
    const val = snapshot.val();
    let activeDevriye = null;

    if(val){
        Object.values(val).forEach(rec => {
            if(rec.startedBy === (currentUser.name || currentUser.username) && rec.status === 'started'){
                activeDevriye = rec;
            }
        });
    }

    if(activeDevriye){
        // DEVRİYE BAŞLADI
        devriyeStartBtn.innerText = "Devriyeye Dön";
        devriyePointsArea.style.display = "none"; // Noktaları gizle
        devriyeStatus.classList.add('active'); // Süreyi göster
        
        // Sayaç Başlat
        const startTime = new Date(activeDevriye.startTime);
        clearInterval(devriyeTimerInterval);
        devriyeTimerInterval = setInterval(()=>{
            const now = new Date();
            const diff = Math.floor((now - startTime)/1000);
            const m = String(Math.floor(diff/60)).padStart(2,'0');
            const s = String(diff%60).padStart(2,'0');
            devriyeStatus.innerText = `⏱️ Devriye Sürüyor: ${m}:${s}`;
        },1000);
    } else {
        // DEVRİYE BAŞLAMADI
        devriyeStartBtn.innerText = "Devriyeyi Başlat";
        devriyePointsArea.style.display = "block"; // Noktaları göster
        devriyeStatus.classList.remove('active'); // Süreyi gizle
        clearInterval(devriyeTimerInterval);
    }
});


devriyeStartBtn.addEventListener('click', async () => {
    // 1. Önce Nöbet Kontrolü
    const valSnapshot = await get(nobetRecordsRef);
    const val = valSnapshot.val();
    let activeNobet = null;
    if(val){
        Object.values(val).forEach(rec => {
            if(rec.startBy === (currentUser.name || currentUser.username) && rec.status === 'started'){
                activeNobet = rec;
            }
        });
    }
    if(!activeNobet){
        showWarningModal("Devriyeye Başlamak İçin Önce Nöbeti Teslim Al");
        return; 
    }
    
    // 2. Sayfaya Yönlendir
    window.location.href = "devriyego.html";
});

// DEVRİYE BİTİR BUTONU GİZLENDİ
if(devriyeEndBtn) devriyeEndBtn.style.display = "none";

// === Devriye Geçmişi Bölümü ===
async function loadDevriyeForDate(dateKey){
    devriyeHistoryEl.innerHTML = 'Yükleniyor...';
    const userKey = currentUser.username || currentUser.name;
    // Geçmiş verisi çekiliyor
    const dailyRef = ref(db, `devriyeHistory/${dateKey}/${userKey}`);
    const snapshot = await get(dailyRef);
    const records = snapshot.exists() ? Object.values(snapshot.val()).sort((a,b)=> (b.timestamp||0)-(a.timestamp||0)) : [];
    devriyeHistoryEl.innerHTML = '';
    if(records.length===0){
        devriyeHistoryEl.innerHTML = `<div style="text-align:center; color:#ecf0f1; font-size:13px; opacity:0.7;">Bu tarihe ait devriye kaydı yok.</div>`;
        return;
    }
    records.forEach(d=>{
        const item=document.createElement('div');
        item.style.cssText = 'marginBottom:10px; padding:12px; background:rgba(0,0,0,0.3); borderRadius:12px; fontSize:13px; color:white; border:1px solid var(--border-color);';
        let statusHtml = "";
        if(d.status==="Eksik devriye"){
            statusHtml = `<span style="color:#e74c3c; font-weight:800;">❌ EKSİK</span>`;
        } else {
            statusHtml = `<span style="color:#2ecc71; font-weight:800;">✅ TAM</span>`;
        }

        item.innerHTML = `
          <strong>Tarih:</strong> ${d.displayDate}<br>
          <strong>Blok:</strong> ${d.block || 'Bilinmiyor'}<br>
          <strong>Süre:</strong> ${d.start} - ${d.end}<br>
          <strong>Durum:</strong> ${statusHtml}
        `;

        devriyeHistoryEl.appendChild(item);
    });
}

// Tarih filtresi
document.addEventListener('DOMContentLoaded', () => {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2,'0');
    const day = String(now.getDate()).padStart(2,'0');
    const todayKey = `${year}-${month}-${day}`; 
    if(filterDate) {
        filterDate.value = todayKey;
        loadDevriyeForDate(todayKey);
    }
});
if(filterDate) {
    filterDate.addEventListener('change', e => {
        const selectedDate = e.target.value;
        if (selectedDate) loadDevriyeForDate(selectedDate);
    });
}

// Geçmiş Paneli Aç/Kapat
historyToggleBtn.addEventListener('click', ()=>{
  if(historyPanel.style.right==='0px'){
    historyPanel.style.right='-100%';
    mainContainer.style.transform='translateX(0)';
  } else {
    historyPanel.style.right='0';
    mainContainer.style.transform='translateX(-300px)';
  }
});

// 📌 KAYIT BUTONUNU ADMİN PANELİNDEN KONTROL ET
const kayitBtn = document.getElementById("kayitBtn");
const kayitRef = ref(db, "panel/kayitAktif");
onValue(kayitRef, (snapshot) => {
  if(kayitBtn) kayitBtn.style.display = snapshot.val() === true ? "flex" : "none";
});
if(kayitBtn) {
    kayitBtn.addEventListener("click", () => {
      sessionStorage.setItem("activeSecurity", currentUser.username || currentUser.name);
      window.location.href = "kayit.html";
    });
}
